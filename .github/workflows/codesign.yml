name: "CMTrace Open: Windows Signed Release"

on:
  push:
    tags:
      - "v*"
      - "[0-9]*.[0-9]*.[0-9]*"
      - "!*.*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (for example 0.1.1 or v0.1.1)
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-windows-release:
    name: Prepare Windows Release
    runs-on: windows-latest
    outputs:
      version: ${{ steps.resolve_version.outputs.version }}
      tag_name: ${{ steps.resolve_version.outputs.tag_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Resolve release version
        id: resolve_version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $rawVersion = "${{ inputs.version }}"
          } else {
            $rawVersion = "${{ github.ref_name }}"
          }

          $normalizedVersion = $rawVersion.Trim()
          if ($normalizedVersion.StartsWith("v")) {
            $normalizedVersion = $normalizedVersion.Substring(1)
          }

          if (-not $normalizedVersion) {
            throw "Could not determine a release version."
          }

          $tagName = "v$normalizedVersion"

          "version=$normalizedVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag_name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate version consistency
        shell: pwsh
        env:
          VERSION: ${{ steps.resolve_version.outputs.version }}
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tauriVersion = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $cargoVersion = $null
          $inPackageSection = $false
          foreach ($line in Get-Content src-tauri/Cargo.toml) {
            if ($line -match '^\[package\]\s*$') {
              $inPackageSection = $true
              continue
            }

            if ($inPackageSection -and $line -match '^\[') {
              break
            }

            if ($inPackageSection -and $line -match '^version\s*=\s*"([^"]+)"\s*$') {
              $cargoVersion = $Matches[1]
              break
            }
          }

          $versions = @{
            package = $packageVersion
            tauri = $tauriVersion
            cargo = $cargoVersion
            workflow = $env:VERSION
          }

          $mismatches = $versions.GetEnumerator() | Where-Object { $_.Value -ne $env:VERSION }
          if ($mismatches) {
            $details = ($versions.GetEnumerator() | ForEach-Object { "{0}={1}" -f $_.Key, $_.Value }) -join ", "
            throw "Version mismatch detected: $details"
          }

      - name: Create release tag for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.resolve_version.outputs.tag_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force

          $tagExists = git rev-parse --verify --quiet "refs/tags/$env:TAG_NAME"
          if (-not $tagExists) {
            git tag $env:TAG_NAME
            git push origin $env:TAG_NAME
          }

      - name: Ensure GitHub release exists
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.resolve_version.outputs.tag_name }}
        run: |
          $releaseTitle = "CMTrace Open $env:TAG_NAME"
          $releaseNotes = @"
          ## CMTrace Open $env:TAG_NAME

          Open-source CMTrace log viewer with built-in Intune diagnostics.

          ### Windows Downloads
          - Signed standalone EXE (x64)
          - Signed MSI installer (x64)
          - Signed standalone EXE (arm64)
          - Signed MSI installer (arm64)
          "@

          $releaseExists = $false
          for ($attempt = 1; $attempt -le 12; $attempt++) {
            gh release view $env:TAG_NAME *> $null
            if ($LASTEXITCODE -eq 0) {
              $releaseExists = $true
              break
            }

            Start-Sleep -Seconds 10
          }

          if (-not $releaseExists) {
            gh release create $env:TAG_NAME --title $releaseTitle --notes $releaseNotes *> $null
            if ($LASTEXITCODE -ne 0) {
              gh release view $env:TAG_NAME *> $null
              if ($LASTEXITCODE -ne 0) {
                throw "GitHub release $env:TAG_NAME was not available and could not be created."
              }
            }
          }

  windows-signed-release:
    name: Signed Windows Release (${{ matrix.label }})
    needs: prepare-windows-release
    runs-on: windows-latest
    environment: codesigning
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows-x64
            rust_target: x86_64-pc-windows-msvc
            artifact_suffix: x64
          - label: Windows-arm64
            rust_target: aarch64-pc-windows-msvc
            artifact_suffix: arm64

    env:
      VERSION: ${{ needs.prepare-windows-release.outputs.version }}
      TAG_NAME: ${{ needs.prepare-windows-release.outputs.tag_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows MSI and standalone EXE
        run: npm run app:build:release -- --target ${{ matrix.rust_target }} --bundles msi

      - name: Stage Windows release artifacts
        id: stage_artifacts
        shell: pwsh
        run: |
          $releaseDir = Join-Path $PWD "src-tauri\target\${{ matrix.rust_target }}\release"
          $bundleMsiDir = Join-Path $releaseDir "bundle\msi"
          $artifactDir = Join-Path $PWD "release-artifacts"

          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          $appExeCandidates = Get-ChildItem -Path $releaseDir -Filter *.exe -File |
            Where-Object {
              $_.DirectoryName -eq $releaseDir -and
              $_.Name -notmatch '(?i)(setup|updater|uninstall|nsis)'
            }

          if ($appExeCandidates.Count -ne 1) {
            $names = ($appExeCandidates | ForEach-Object { $_.FullName }) -join ", "
            throw "Expected exactly one standalone app EXE in $releaseDir. Found: $names"
          }

          $msiCandidates = Get-ChildItem -Path $bundleMsiDir -Filter *.msi -File -Recurse
          if ($msiCandidates.Count -ne 1) {
            $names = ($msiCandidates | ForEach-Object { $_.FullName }) -join ", "
            throw "Expected exactly one MSI in $bundleMsiDir. Found: $names"
          }

          $stagedExe = Join-Path $artifactDir "CMTrace-Open_$($env:VERSION)_${{ matrix.artifact_suffix }}.exe"
          $stagedMsi = Join-Path $artifactDir "CMTrace-Open_$($env:VERSION)_${{ matrix.artifact_suffix }}.msi"

          Copy-Item $appExeCandidates[0].FullName $stagedExe -Force
          Copy-Item $msiCandidates[0].FullName $stagedMsi -Force

          "signed_exe_path=$stagedExe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "signed_msi_path=$stagedMsi" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Sign standalone EXE
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.SIGNING_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\release-artifacts
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign MSI
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.SIGNING_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\release-artifacts
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload signed workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cmtrace-open-windows-signed-${{ matrix.artifact_suffix }}-${{ env.VERSION }}
          path: |
            ${{ steps.stage_artifacts.outputs.signed_exe_path }}
            ${{ steps.stage_artifacts.outputs.signed_msi_path }}
          if-no-files-found: error

      - name: Publish signed Windows assets to GitHub Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNED_EXE_PATH: ${{ steps.stage_artifacts.outputs.signed_exe_path }}
          SIGNED_MSI_PATH: ${{ steps.stage_artifacts.outputs.signed_msi_path }}
        run: |
          gh release upload $env:TAG_NAME $env:SIGNED_EXE_PATH $env:SIGNED_MSI_PATH --clobber